# Cloud Build config for deploying the REopt Julia solver to Cloud Run.
# This deploys ONLY the Julia HTTP server (http.jl) — no Django, Celery,
# Redis, or Postgres. Your own service handles persistence and orchestration.
#
# Prerequisites:
#   1. Artifact Registry repo: gcloud artifacts repositories create reopt \
#        --repository-format=docker --location=${_REGION}
#   2. Secret in Secret Manager: reopt-nrel-api-key
#
# Trigger manually:
#   gcloud builds submit --config=cloudbuild.yaml --substitutions=_REGION=us-central1

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: reopt-julia

steps:
  # ── Build the Julia solver image ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/reopt/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/reopt/${_SERVICE_NAME}:latest'
      - '-f'
      - 'julia_src/Dockerfile'
      - 'julia_src/'
    id: 'build'

  # ── Push image ──
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/reopt/${_SERVICE_NAME}']
    id: 'push'
    waitFor: ['build']

  # ── Deploy to Cloud Run ──
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/reopt/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8081'
      - '--command=julia'
      - '--args=--project=/opt/julia_src,-e,include("http.jl")'
      - '--cpu=4'
      - '--memory=8Gi'
      - '--timeout=900'
      - '--concurrency=4'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--execution-environment=gen2'
      - '--cpu-boost'
      - '--set-env-vars=XPRESS_JL_SKIP_LIB_CHECK=True,XPRESS_INSTALLED=False,JULIA_NUM_THREADS=4'
      - '--set-secrets=NREL_DEVELOPER_API_KEY=reopt-nrel-api-key:latest'
      - '--allow-unauthenticated'
    id: 'deploy'
    waitFor: ['push']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/reopt/${_SERVICE_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
